name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy to Cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup D1 Database
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Looking up D1 database ==="
          
          # List databases and find ours
          D1_RESPONSE=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/d1/database" \
            -H "Authorization: Bearer $CF_TOKEN")
          
          echo "API response received"
          D1_ID=$(echo "$D1_RESPONSE" | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    if data.get('success'):
        for db in data.get('result', []):
            if db['name'] == 'affiliation-pro-db':
                print(db['uuid'])
                break
    else:
        print('API_ERROR')
except Exception as e:
    print(f'PARSE_ERROR: {e}')
" 2>&1)
          
          echo "D1 lookup result: $D1_ID"
          
          if [ "$D1_ID" = "API_ERROR" ] || [ "$D1_ID" = "PARSE_ERROR" ] || [ -z "$D1_ID" ]; then
            echo "Creating new D1 database..."
            CREATE_RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/d1/database" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name": "affiliation-pro-db"}')
            
            D1_ID=$(echo "$CREATE_RESPONSE" | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    print(data.get('result', {}).get('uuid', ''))
except:
    print('')
" 2>&1)
          fi
          
          if [ -n "$D1_ID" ] && [ "$D1_ID" != "API_ERROR" ] && [ "$D1_ID" != "PARSE_ERROR" ]; then
            echo "D1_ID=$D1_ID" >> "$GITHUB_ENV"
            sed -i "s/PLACEHOLDER_D1_ID/$D1_ID/" wrangler.toml
            echo "=== D1 ready: $D1_ID ==="
          else
            echo "=== WARNING: D1 not available, building without DB ==="
          fi

      - name: Run D1 Migrations
        if: env.D1_ID != ''
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Running migrations on $D1_ID ==="
          ENCODED_SQL=$(python3 -c "import json; print(json.dumps(open('schema-d1.sql').read()))")
          RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/d1/database/$D1_ID/query" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"sql\": $ENCODED_SQL}")
          echo "$RESULT" | python3 -c "
import sys, json
d = json.load(sys.stdin)
if d.get('success'):
    print('Migration OK')
else:
    errs = d.get('errors', [])
    for e in errs:
        print(f'Warning: {e.get(\"message\", \"unknown error\")}')
    print('Continuing...')
"

      - name: Build with OpenNext for Cloudflare
        run: npx @opennextjs/cloudflare build
        env:
          NEXT_PUBLIC_SITE_URL: "https://affiliation-pro.cashflowecosysteme.workers.dev"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
