name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy to Cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup D1 Database
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Creating/finding D1 database ==="
          
          CREATE_RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/d1/database" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name": "affiliation-pro-db"}')
          
          D1_ID=$(echo "$CREATE_RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('uuid',''))" 2>/dev/null || true)
          
          if [ -z "$D1_ID" ]; then
            echo "Database may already exist, looking it up..."
            D1_ID=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/d1/database" \
              -H "Authorization: Bearer $CF_TOKEN" | \
              python3 -c "import sys,json; dbs=json.load(sys.stdin).get('result',[]); print([d['uuid'] for d in dbs if d['name']=='affiliation-pro-db'][0])" 2>/dev/null || true)
          fi
          
          if [ -n "$D1_ID" ]; then
            echo "D1_ID=$D1_ID" >> "$GITHUB_ENV"
            echo "D1 Database ID: $D1_ID"
            sed -i "s/PLACEHOLDER_D1_ID/$D1_ID/" wrangler.toml
            echo "Updated wrangler.toml with D1 ID"
          else
            echo "ERROR: Could not get D1 database ID"
            exit 1
          fi

      - name: Run D1 Migrations
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Running D1 migrations ==="
          
          TABLE_CHECK=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/d1/database/$D1_ID/query" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"sql": "SELECT name FROM sqlite_master WHERE type='"'"'table'"'"' AND name='"'"'users'"'"'"}' | \
            python3 -c "import sys,json; print(len(json.load(sys.stdin).get('result',{}).get('results',[])))" 2>/dev/null || echo "0")
          
          if [ "$TABLE_CHECK" = "0" ]; then
            echo "Tables don't exist, running schema..."
            SQL_CONTENT=$(cat schema-d1.sql)
            ENCODED_SQL=$(python3 -c "import json; print(json.dumps(open('schema-d1.sql').read()))")
            RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/d1/database/$D1_ID/query" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"sql\": $ENCODED_SQL}")
            echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Schema OK' if d.get('success') else 'ERROR: ' + str(d.get('errors')))"
          else
            echo "Tables already exist, skipping migration"
          fi

      - name: Build with OpenNext for Cloudflare
        run: npx @opennextjs/cloudflare build
        env:
          NEXT_PUBLIC_SITE_URL: "https://affiliation-pro.cashflowecosysteme.workers.dev"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
