name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy to Cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create D1 Database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Try to create D1 database (idempotent - fails silently if exists)
          D1_INFO=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name": "affiliation-pro-db"}')
          
          # Get D1 database ID (from creation response or existing)
          D1_ID=$(echo "$D1_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('uuid',''))" 2>/dev/null)
          
          if [ -z "$D1_ID" ]; then
            # Database already exists, get its ID
            D1_ID=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | \
              python3 -c "import sys,json; dbs=json.load(sys.stdin).get('result',[]); print([d['uuid'] for d in dbs if d['name']=='affiliation-pro-db'][0])" 2>/dev/null)
          fi
          
          if [ -n "$D1_ID" ]; then
            echo "D1 Database ID: $D1_ID"
            # Update wrangler.toml with the real database ID
            sed -i "s/PLACEHOLDER_D1_ID/$D1_ID/" wrangler.toml
          else
            echo "WARNING: Could not get D1 database ID"
          fi

      - name: Run D1 Migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Read the D1 database ID from wrangler.toml
          D1_ID=$(grep 'database_id' wrangler.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          
          if [ "$D1_ID" != "PLACEHOLDER_D1_ID" ]; then
            echo "Running D1 migrations on database: $D1_ID"
            
            # Check if users table exists
            TABLE_CHECK=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database/$D1_ID/query" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"sql": "SELECT name FROM sqlite_master WHERE type='"'"'table'"'"' AND name='"'"'users'"'"'"}' | \
              python3 -c "import sys,json; print(len(json.load(sys.stdin).get('result',{}).get('results',[])))" 2>/dev/null)
            
            if [ "$TABLE_CHECK" = "0" ]; then
              echo "Tables don't exist yet, running initial schema..."
              # Read schema file and execute each statement
              # D1 API accepts multiple statements
              curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database/$D1_ID/query" \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"sql\": $(python3 -c "
import json
with open('schema-d1.sql') as f:
    sql = f.read()
print(json.dumps(sql))
")}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Schema applied' if d.get('success') else 'Error: ' + str(d.get('errors')))"
            else
              echo "Tables already exist, skipping migration"
            fi
          else
            echo "WARNING: D1 database not configured, skipping migrations"
          fi

      - name: Build with OpenNext for Cloudflare
        run: npx @opennextjs/cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: "https://affiliation-pro.cashflowecosysteme.workers.dev"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
