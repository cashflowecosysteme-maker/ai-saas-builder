name = "affiliation-pro"
main = ".open-next/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "affiliation-pro-db"
database_id = "PLACEHOLDER_D1_ID"

# Environment variables
[vars]
NEXT_PUBLIC_SITE_URL = "https://affiliation-pro.cashflowecosysteme.workers.dev"
JWT_SECRET = "affiliation-pro-jwt-secret-2026-secure"

# Secrets (set via wrangler or Cloudflare dashboard):
# SUPABASE_SERVICE_ROLE_KEY (for backward compatibility, not used with D1)
